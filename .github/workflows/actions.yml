name: action workflow

on:
 push:
  branches:
   - main
   - demo/* # It starts with demo like demo-project123
   - '!sample' #Ignore this branch

  tags:
    - v1.*  # its like v1.0 ,v1.2

  paths:
    - '**.js' # like index.js,js/index.js
    - "**.md" 
    - "docs/*"
    - "!docs/file.txt"

jobs:
 run-github-actions:
   runs-on: ubuntu-latest
   steps:
     - name: List files
       run: |
        pwd
        ls -a
        echo "$GITHUB_SHA"
        echo "$GITHUB_REPOSITORY"
        echo "$GITHUB_WORKSPACE"
     - name: Checkouts
       uses: actions/checkout@v1  
     - name: List files after checkout
       run: |
        pwd
        ls -a
     - name: simple javascript actions
       uses: actions/hello-world-javascript-action@v1
       with:
        who-to-greet: DevOps hint 

   
